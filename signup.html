<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Join Aerie Encounters to book exclusive falconry experiences, track your wildlife workshops, and receive field notes from our handlers.">
  <title>Sign Up | Aerie Encounters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
</head>
<body class="bg-midnight min-h-screen flex flex-col items-center justify-center py-12 px-4 relative overflow-y-auto">
  <!-- Top Actions -->
  <div class="fixed top-6 right-6 z-50 flex gap-2">
    <button class="icon-btn !w-10 !h-10 !bg-white/5 !border-white/10" type="button" data-theme-toggle aria-label="Toggle theme">
      <i data-lucide="moon" class="w-4 h-4 text-ivory"></i>
    </button>
    <button class="icon-btn !w-10 !h-10 !bg-white/5 !border-white/10" type="button" data-rtl-toggle aria-label="Toggle RTL">
      <i data-lucide="languages" class="w-4 h-4 text-ivory"></i>
    </button>
  </div>

  <!-- Ambient Background -->
  <div class="absolute inset-0 z-0">
    <div class="absolute inset-0 bg-gradient-to-br from-midnight via-midnight/90 to-midnight/80"></div>
    <img src="assets/img/hawk_forest.png" class="w-full h-full object-cover opacity-20 blur-sm" alt="">
  </div>
  <div class="ambient-particles"></div>

  <main class="relative z-10 w-full max-w-[500px] flex flex-col items-center reveal">
    <div class="glass-panel p-8 md:p-12 shadow-2xl border-white/10 w-full">
      <div class="flex flex-col items-center mb-10">
        <a href="index.html" class="flex flex-col items-center gap-3 transition-transform hover:scale-105 mb-6">
          <span class="grid h-14 w-14 place-items-center rounded-full border border-bronze/50 bg-bronze/15 text-bronze">
            <i data-lucide="feather" class="w-7 h-7"></i>
          </span>
          <div class="text-center">
            <span class="block font-display text-2xl font-bold tracking-tight text-ivory">Aerie Encounters</span>
          </div>
        </a>
        <p class="kicker justify-center">Start Your Journey</p>
        <h1 class="font-display text-4xl font-bold mt-4 text-center">Create Your Account</h1>
        <p class="text-ivory/60 mt-3 text-sm text-center">Join a community of wildlife enthusiasts and field craft learners.</p>
      </div>

      <form class="grid gap-5">
        <div class="grid grid-cols-2 gap-4">
          <label class="grid gap-2 text-xs font-bold uppercase tracking-widest text-ivory/80">
            First Name
            <input type="text" class="form-field !bg-white/5 !border-white/10 focus:!border-bronze" placeholder="Aria" required>
          </label>
          <label class="grid gap-2 text-xs font-bold uppercase tracking-widest text-ivory/80">
            Last Name
            <input type="text" class="form-field !bg-white/5 !border-white/10 focus:!border-bronze" placeholder="Vane" required>
          </label>
        </div>

        <label class="grid gap-2 text-xs font-bold uppercase tracking-widest text-ivory/80">
          Email Address
          <input type="email" class="form-field !bg-white/5 !border-white/10 focus:!border-bronze" placeholder="aria@example.com" required>
        </label>
        
        <label class="grid gap-2 text-xs font-bold uppercase tracking-widest text-ivory/80">
          <span>Create Password</span>
          <div class="relative">
            <input type="password" id="signup-password" class="form-field !bg-white/5 !border-white/10 focus:!border-bronze w-full pr-10" placeholder="••••••••" required>
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-ivory/50 hover:text-bronze transition-colors" onclick="const p = document.getElementById('signup-password'); p.type = p.type === 'password' ? 'text' : 'password'; this.querySelector('i').setAttribute('data-lucide', p.type === 'password' ? 'eye' : 'eye-off'); lucide.createIcons();" aria-label="Toggle password visibility">
              <i data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </label>

        <p class="text-[11px] text-ivory/50 leading-relaxed mt-1 text-center">
          By creating an account, you agree to our 
          <a href="#" class="text-bronze hover:underline">Terms of Service</a> and 
          <a href="#" class="text-bronze hover:underline">Privacy Policy</a> regarding wildlife welfare.
        </p>

        <button type="submit" class="btn-primary !min-h-12 w-full mt-4">
          <i data-lucide="user-plus" class="w-4 h-4"></i>Create Field Account
        </button>
      </form>

      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
        <div class="relative flex justify-center text-[10px] uppercase tracking-[0.2em]"><span class="bg-midnight px-4 text-ivory/40">Or sign up with</span></div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button class="icon-btn !w-full !h-12 !rounded-xl !border-white/10 hover:!bg-white/5 flex items-center justify-center gap-2 text-xs">
          <i data-lucide="mail" class="w-4 h-4 text-bronze"></i>Google
        </button>
        <button class="!w-full !h-12 !rounded-xl !bg-black !text-white hover:!bg-zinc-900 transition-colors flex items-center justify-center gap-2 text-xs font-semibold">
          <i data-lucide="apple" class="w-4 h-4 fill-white"></i>Apple
        </button>
      </div>

      <p class="text-center mt-10 text-sm text-ivory/60">
        Already have an account? 
        <a href="login.html" class="text-bronze font-bold hover:underline">Sign in instead</a>
      </p>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
